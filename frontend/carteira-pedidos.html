<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Carteira de Pedidos — Coco do Vale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif;font-size:12px;background:#f0f2f5}
body{display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{background:#1e3a5f;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:12px}
.logo{font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:18px;line-height:1;color:#fff}
.logo span{display:block;font-size:11px;font-weight:400;font-style:italic;opacity:.85}
.topbar h1{font-size:16px;font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#userEmail{font-size:11px;color:#cbd5e1}
.btn-sm{border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;cursor:pointer;font-size:11px;padding:5px 12px;border-radius:6px;font-weight:600}
.btn-sm:hover{background:rgba(255,255,255,.12)}
#atualizadoEm{font-size:10px;color:#93c5fd}

/* ── FILTROS ── */
.filtros{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.filtros label{font-size:11px;font-weight:700;color:#374151;display:flex;flex-direction:column;gap:3px}
.filtros select,.filtros input{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151;background:#fff;min-width:120px}
.filtros input{min-width:200px}
.filtros select:focus,.filtros input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
#btnLimpar{padding:5px 14px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;cursor:pointer;background:#f9fafb;color:#374151;font-weight:600}
#btnLimpar:hover{background:#f3f4f6}
#btnExport{padding:5px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;background:#16a34a;color:#fff;font-weight:600;margin-left:auto}
#btnExport:hover{background:#15803d}
#totalItens{font-size:11px;color:#6b7280;font-weight:600;white-space:nowrap}

/* ── KPI CARDS ── */
.kpi-area{padding:12px 20px 8px;flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.kcard{border-radius:8px;padding:12px 14px;color:#fff;border:2px solid;display:flex;flex-direction:column;justify-content:center}
.kcard-total  {background:#1e3a5f;border-color:#3b82f6}
.kcard-valor  {background:#14532d;border-color:#22c55e}
.kcard-peso   {background:#1e3a5f;border-color:#60a5fa}
.kcard-pend   {background:#78350f;border-color:#f59e0b}
.kcard-parc   {background:#1e40af;border-color:#93c5fd}
.kcard-sest   {background:#7f1d1d;border-color:#ef4444}
.kcard-prog   {background:#312e81;border-color:#818cf8}
.kcard-imdt   {background:#064e3b;border-color:#34d399}
.kl{font-size:9px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.04em}
.kv{font-size:20px;font-weight:800;margin:3px 0}
.ks{font-size:9px;opacity:.75}

/* ── TABELA ── */
.table-area{flex:1;overflow:hidden;padding:0 20px 12px;display:flex;flex-direction:column;min-height:0}
.table-wrap{flex:1;overflow:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:auto}
thead th{background:#f9fafb;padding:6px 8px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb;position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:#f3f4f6}
thead th.sort-asc::after{content:" ▲";font-size:9px;color:#6b7280}
thead th.sort-desc::after{content:" ▼";font-size:9px;color:#6b7280}
tbody td{padding:5px 8px;border-bottom:1px solid #f3f4f6;white-space:nowrap}
tbody tr:hover td{background:#f8fafc}
.td-r{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-pend{background:#fef3c7;color:#92400e}
.badge-parc{background:#dbeafe;color:#1e40af}
.saldo-neg{color:#dc2626;font-weight:700}
.saldo-ok {color:#16a34a;font-weight:600}

#loading{text-align:center;padding:60px;color:#6b7280;font-size:14px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">Coco<span>do Vale</span></div>
    <h1>Carteira de Pedidos</h1>
  </div>
  <div class="topbar-right">
    <span id="atualizadoEm"></span>
    <span id="userEmail"></span>
    <button class="btn-sm" onclick="window.location.href='index.html'">← Painel</button>
    <button class="btn-sm" id="logoutBtn">Sair</button>
  </div>
</div>

<!-- FILTROS -->
<div class="filtros" id="filtrosBar" style="display:none">
  <label>Buscar
    <input type="text" id="fBusca" placeholder="Pedido, cliente, produto, vendedor…">
  </label>
  <label>Situação
    <select id="fSit">
      <option value="">Todas</option>
      <option value="PENDENTE">Pendente</option>
      <option value="PARCIAL">Parcial</option>
    </select>
  </label>
  <label>UF
    <select id="fUF"><option value="">Todas</option></select>
  </label>
  <label>Vendedor
    <select id="fVend"><option value="">Todos</option></select>
  </label>
  <label>Mês emissão
    <select id="fMes">
      <option value="">Todos</option>
      <option value="01">Janeiro</option><option value="02">Fevereiro</option>
      <option value="03">Março</option><option value="04">Abril</option>
      <option value="05">Maio</option><option value="06">Junho</option>
      <option value="07">Julho</option><option value="08">Agosto</option>
      <option value="09">Setembro</option><option value="10">Outubro</option>
      <option value="11">Novembro</option><option value="12">Dezembro</option>
    </select>
  </label>
  <label>Estoque
    <select id="fEstoque">
      <option value="">Todos</option>
      <option value="ok">Com estoque</option>
      <option value="neg">Sem estoque</option>
    </select>
  </label>
  <button id="btnLimpar">Limpar filtros</button>
  <span id="totalItens"></span>
  <button id="btnExport">📊 Exportar CSV</button>
</div>

<!-- KPI CARDS -->
<div class="kpi-area" id="kpiArea" style="display:none">
  <div class="kpi-grid" id="kpiGrid"></div>
</div>

<!-- TABELA -->
<div class="table-area" id="tableArea" style="display:none">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="N PEDIDO">Pedido</th>
          <th data-col="SITUACAO">Situação</th>
          <th data-col="EMISSAO">Emissão</th>
          <th data-col="PRVFAT">Prev. Fat.</th>
          <th data-col="DT ENTREGA">Dt. Entrega</th>
          <th data-col="NOME CLIENTE">Cliente</th>
          <th data-col="UF">UF</th>
          <th data-col="VENDEDOR">Vendedor</th>
          <th data-col="IT">It.</th>
          <th data-col="COD PRODUTO">Produto</th>
          <th data-col="QTD PENDENTE" class="td-r">Qtd Pend.</th>
          <th data-col="SALDO ESTOQUE" class="td-r">Saldo Estq.</th>
          <th data-col="VAL TO DO ITEM" class="td-r">Valor</th>
          <th data-col="PESO BRUTO" class="td-r">Peso (kg)</th>
          <th data-col="PRAZO">Prazo Pgto</th>
          <th data-col="PED CLIENTE">Ped. Cliente</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="loading">Carregando carteira de pedidos…</div>

<script>
const API_BASE = window.API_BASE_URL || "";
let _dados = null;          // resposta bruta da API
let _sortCol = "EMISSAO";
let _sortAsc = false;

// ── AUTH ──────────────────────────────────────────────────
function irLogin() {
  window.location.href = "login.html?voltar=carteira-pedidos.html";
}
async function checarSessao() {
  try {
    const r = await fetch(`${API_BASE}/api/auth/me`, { credentials: "include" });
    if (!r.ok) { irLogin(); return false; }
    document.getElementById("userEmail").textContent = (await r.json()).email;
    return true;
  } catch { irLogin(); return false; }
}
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await fetch(`${API_BASE}/api/auth/logout`, { method: "POST", credentials: "include" });
  irLogin();
});

// ── FORMATAÇÃO ────────────────────────────────────────────
function fmtMoeda(v) {
  if (v == null || isNaN(v)) return "R$ 0";
  const d3 = n => n.toLocaleString("en-US", { minimumFractionDigits: 3, maximumFractionDigits: 3 }).replace(/,/g, "");
  if (Math.abs(v) >= 1e6) return "R$ " + d3(v / 1e6) + " M";
  if (Math.abs(v) >= 1e3) return "R$ " + d3(v / 1e3) + " k";
  return "R$ " + Math.round(v).toLocaleString("pt-BR");
}
function fmtNum(v) {
  if (v == null || isNaN(v)) return "0";
  return Number(v).toLocaleString("pt-BR", { maximumFractionDigits: 2 });
}
function fmtData(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

// ── CARREGAR ──────────────────────────────────────────────
async function carregar() {
  try {
    const r = await fetch(`${API_BASE}/api/carteira-pedidos`, { credentials: "include" });
    if (r.status === 401) { irLogin(); return; }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    _dados = await r.json();
    popularSelects();
    renderTabela();
    document.getElementById("loading").style.display = "none";
    document.getElementById("filtrosBar").style.display = "flex";
    document.getElementById("kpiArea").style.display = "block";
    document.getElementById("tableArea").style.display = "flex";
    document.getElementById("atualizadoEm").textContent =
      "Atualizado às " + new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  } catch (e) {
    document.getElementById("loading").textContent = "Erro ao carregar: " + e.message;
  }
}

// ── SELECTS DINÂMICOS ─────────────────────────────────────
function popularSelects() {
  const itens = _dados.itens;
  const ufs  = [...new Set(itens.map(r => r["UF"]).filter(Boolean))].sort();
  const vends = [...new Set(itens.map(r => r["VENDEDOR"]).filter(Boolean))].sort();

  const fUF = document.getElementById("fUF");
  const fVend = document.getElementById("fVend");
  const selUF = fUF.value; const selVend = fVend.value;

  fUF.innerHTML = '<option value="">Todas</option>';
  ufs.forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v; fUF.appendChild(o); });

  fVend.innerHTML = '<option value="">Todos</option>';
  vends.forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v; fVend.appendChild(o); });

  if (selUF)  fUF.value  = selUF;
  if (selVend) fVend.value = selVend;
}

// ── KPI CARDS ─────────────────────────────────────────────
function renderKPIs(k) {
  document.getElementById("kpiGrid").innerHTML = `
    <div class="kcard kcard-total">
      <div class="kl">📋 Total pedidos</div>
      <div class="kv">${k.total_pedidos.toLocaleString("pt-BR")}</div>
      <div class="ks">${k.total_itens.toLocaleString("pt-BR")} itens · ${k.clientes_qtd} clientes</div>
    </div>
    <div class="kcard kcard-valor">
      <div class="kl">💰 Valor em carteira</div>
      <div class="kv">${fmtMoeda(k.valor_total)}</div>
      <div class="ks">${fmtNum(k.peso_total)} kg peso total</div>
    </div>
    <div class="kcard kcard-pend">
      <div class="kl">⏳ Pendentes</div>
      <div class="kv">${k.pendentes_qtd.toLocaleString("pt-BR")}</div>
      <div class="ks">${fmtMoeda(k.pendentes_valor)} sem NF emitida</div>
    </div>
    <div class="kcard kcard-parc">
      <div class="kl">🔄 Parciais</div>
      <div class="kv">${k.parciais_qtd.toLocaleString("pt-BR")}</div>
      <div class="ks">${fmtMoeda(k.parciais_valor)} fat. parcial</div>
    </div>
    <div class="kcard kcard-prog">
      <div class="kl">📅 Fat. Programado</div>
      <div class="kv">${fmtMoeda(k.prog_valor)}</div>
      <div class="ks">${fmtNum(k.prog_peso)} kg peso programado</div>
    </div>
    <div class="kcard kcard-imdt">
      <div class="kl">⚡ Fat. Imediato</div>
      <div class="kv">${fmtMoeda(k.imdt_valor)}</div>
      <div class="ks">${fmtNum(k.imdt_peso)} kg peso imediato</div>
    </div>
    <div class="kcard kcard-sest">
      <div class="kl">⚠️ Sem estoque</div>
      <div class="kv">${k.sem_estoque_qtd.toLocaleString("pt-BR")}</div>
      <div class="ks">${fmtMoeda(k.sem_estoque_valor)} em risco</div>
    </div>
    <div class="kcard kcard-peso">
      <div class="kl">⚖️ Peso pendente</div>
      <div class="kv">${fmtNum(k.peso_total)} kg</div>
      <div class="ks">${k.clientes_qtd} clientes · ${k.total_itens.toLocaleString("pt-BR")} itens</div>
    </div>
  `;
}

// ── FILTROS ───────────────────────────────────────────────
function filtrar(itens) {
  const busca = document.getElementById("fBusca").value.toLowerCase();
  const sit   = document.getElementById("fSit").value;
  const uf    = document.getElementById("fUF").value;
  const vend  = document.getElementById("fVend").value;
  const mes   = document.getElementById("fMes").value;
  const estq  = document.getElementById("fEstoque").value;

  return itens.filter(r => {
    if (sit  && r["SITUACAO"] !== sit) return false;
    if (uf   && r["UF"] !== uf) return false;
    if (vend && r["VENDEDOR"] !== vend) return false;
    if (estq === "ok"  && (r["SALDO ESTOQUE"] ?? 0) < 0) return false;
    if (estq === "neg" && (r["SALDO ESTOQUE"] ?? 0) >= 0) return false;
    if (mes  && r["EMISSAO"] && !r["EMISSAO"].startsWith(`${new Date().getFullYear()}-${mes}`)) return false;
    if (busca) {
      const haystack = [
        r["N PEDIDO"], r["PED CLIENTE"], r["NOME CLIENTE"],
        r["COD PRODUTO"], r["VENDEDOR"]
      ].join(" ").toLowerCase();
      if (!haystack.includes(busca)) return false;
    }
    return true;
  });
}

// ── ORDENAÇÃO ─────────────────────────────────────────────
function ordenar(itens) {
  return [...itens].sort((a, b) => {
    let va = a[_sortCol] ?? "";
    let vb = b[_sortCol] ?? "";
    if (typeof va === "number" && typeof vb === "number") {
      return _sortAsc ? va - vb : vb - va;
    }
    va = String(va); vb = String(vb);
    return _sortAsc ? va.localeCompare(vb, "pt-BR") : vb.localeCompare(va, "pt-BR");
  });
}

// ── KPIs DINÂMICOS (recalcula dos itens filtrados) ────────
function calcularKPIs(itens) {
  const uniq = (arr) => new Set(arr).size;
  const soma = (arr, col) => arr.reduce((s, r) => s + (r[col] ?? 0), 0);

  const pend = itens.filter(r => r["SITUACAO"] === "PENDENTE");
  const parc = itens.filter(r => r["SITUACAO"] === "PARCIAL");
  const sest = itens.filter(r => (r["SALDO ESTOQUE"] ?? 0) < 0);
  // Programado = tem PRVFAT preenchida (faturamento agendado para uma data)
  // Imediato   = sem PRVFAT e com saldo de estoque positivo (pode faturar agora)
  const prog = itens.filter(r => r["PRVFAT"] && r["PRVFAT"] !== "");
  const imdt = itens.filter(r => (!r["PRVFAT"] || r["PRVFAT"] === "") && (r["SALDO ESTOQUE"] ?? 0) >= 0);

  return {
    total_pedidos:   uniq(itens.map(r => r["N PEDIDO"])),
    total_itens:     itens.length,
    valor_total:     soma(itens, "VAL TO DO ITEM"),
    peso_total:      soma(itens, "PESO BRUTO"),
    pendentes_qtd:   uniq(pend.map(r => r["N PEDIDO"])),
    pendentes_valor: soma(pend, "VAL TO DO ITEM"),
    parciais_qtd:    uniq(parc.map(r => r["N PEDIDO"])),
    parciais_valor:  soma(parc, "VAL TO DO ITEM"),
    sem_estoque_qtd:   sest.length,
    sem_estoque_valor: soma(sest, "VAL TO DO ITEM"),
    clientes_qtd:    uniq(itens.map(r => r["CODIGO"])),
    prog_qtd:    uniq(prog.map(r => r["N PEDIDO"])),
    prog_valor:  soma(prog, "VAL TO DO ITEM"),
    prog_peso:   soma(prog, "PESO BRUTO"),
    imdt_qtd:    uniq(imdt.map(r => r["N PEDIDO"])),
    imdt_valor:  soma(imdt, "VAL TO DO ITEM"),
    imdt_peso:   soma(imdt, "PESO BRUTO"),
  };
}

// ── TABELA ────────────────────────────────────────────────
function renderTabela() {
  if (!_dados) return;
  const filtrados = ordenar(filtrar(_dados.itens));
  document.getElementById("totalItens").textContent = `${filtrados.length} de ${_dados.itens.length} itens`;
  renderKPIs(calcularKPIs(filtrados));

  document.getElementById("tbody").innerHTML = filtrados.map(r => {
    const saldo = r["SALDO ESTOQUE"] ?? 0;
    const saldoCls = saldo < 0 ? "saldo-neg" : "saldo-ok";
    const badgeCls = r["SITUACAO"] === "PENDENTE" ? "badge-pend" : "badge-parc";
    return `<tr>
      <td><strong>${r["N PEDIDO"] || "—"}</strong></td>
      <td><span class="badge ${badgeCls}">${r["SITUACAO"] || "—"}</span></td>
      <td>${fmtData(r["EMISSAO"])}</td>
      <td>${fmtData(r["PRVFAT"])}</td>
      <td>${fmtData(r["DT ENTREGA"])}</td>
      <td>${r["NOME CLIENTE"] || "—"}</td>
      <td>${r["UF"] || "—"}</td>
      <td>${r["VENDEDOR"] || "—"}</td>
      <td>${r["IT"] || "—"}</td>
      <td>${r["COD PRODUTO"] || "—"}</td>
      <td class="td-r">${fmtNum(r["QTD PENDENTE"])}</td>
      <td class="td-r ${saldoCls}">${fmtNum(saldo)}</td>
      <td class="td-r">${fmtMoeda(r["VAL TO DO ITEM"])}</td>
      <td class="td-r">${fmtNum(r["PESO BRUTO"])}</td>
      <td>${r["PRAZO"] || "—"}</td>
      <td>${r["PED CLIENTE"] || "—"}</td>
    </tr>`;
  }).join("");

  // atualiza cabeçalhos de ordenação
  document.querySelectorAll("thead th").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.col === _sortCol) {
      th.classList.add(_sortAsc ? "sort-asc" : "sort-desc");
    }
  });
}

// ── ORDENAÇÃO POR CLIQUE NO CABEÇALHO ────────────────────
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    if (_sortCol === th.dataset.col) _sortAsc = !_sortAsc;
    else { _sortCol = th.dataset.col; _sortAsc = true; }
    renderTabela();
  });
});

// ── EVENTOS DOS FILTROS ───────────────────────────────────
["fBusca","fSit","fUF","fVend","fMes","fEstoque"].forEach(id => {
  document.getElementById(id).addEventListener(id === "fBusca" ? "input" : "change", renderTabela);
});

document.getElementById("btnLimpar").addEventListener("click", () => {
  document.getElementById("fBusca").value = "";
  ["fSit","fUF","fVend","fMes","fEstoque"].forEach(id => {
    document.getElementById(id).value = "";
  });
  renderTabela();
});

// ── EXPORTAR CSV ─────────────────────────────────────────
document.getElementById("btnExport").addEventListener("click", () => {
  if (!_dados) return;
  const filtrados = ordenar(filtrar(_dados.itens));
  if (!filtrados.length) { alert("Nenhum item para exportar."); return; }
  const cols = Object.keys(filtrados[0]);
  const linhas = [cols.join(";")];
  filtrados.forEach(r => linhas.push(cols.map(c => r[c] ?? "").join(";")));
  const blob = new Blob(["﻿" + linhas.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url;
  a.download = `Carteira_Pedidos_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
});

// ── INICIALIZAR ───────────────────────────────────────────
(async () => {
  if (await checarSessao()) {
    await carregar();
    setInterval(carregar, 60000);
  }
})();
</script>
</body>
</html>
